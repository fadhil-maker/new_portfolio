                    document.documentElement.classList.remove('dark');
                    localStorage.theme = 'light';

                    document.documentElement.classList.add('dark');
                    localStorage.theme = 'dark';

<script>
    // Shared Audio Engine
    const AudioMatrix = {
        ctx: null,
        init() {
            if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (this.ctx.state === 'suspended') this.ctx.resume();
        },
        playTick() {
            this.init();
            const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(750, this.ctx.currentTime);
            gain.gain.setValueAtTime(0.02, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.015);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.015);
        },
        playDynamicKey(char) {
            this.init();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            const filter = this.ctx.createBiquadFilter();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.05);
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(800, this.ctx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.05);
            gain.gain.setValueAtTime(0, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.15, this.ctx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
            osc.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.06);
        },
        playExplosion() {
            this.init();
            const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, this.ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(60, this.ctx.currentTime + 0.14);
            gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.14);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.14);
        },
        playError() {
            this.init();
            const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, this.ctx.currentTime);
            gain.gain.setValueAtTime(0.09, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, this.ctx.currentTime + 0.15);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.15);
        },
        playGameOver() {
            this.init(); const now = this.ctx.currentTime;
            [160, 130, 95].forEach((freq, i) => {
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(freq, now + i * 0.1);
                gain.gain.setValueAtTime(0.08, now + i * 0.1);
                gain.gain.linearRampToValueAtTime(0.001, now + i * 0.1 + 0.35);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.35);
            });
        },
        playWin() {
            this.init(); const now = this.ctx.currentTime;
            [261.63, 329.63, 392.00, 523.25].forEach((freq, i) => {
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now + i * 0.06);
                gain.gain.setValueAtTime(0.04, now + i * 0.06);
                gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.06 + 0.22);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(now + i * 0.06); osc.stop(now + i * 0.06 + 0.22);
            });
        }
    };
    let activeMouseX = 0, activeMouseY = 0;
    window.addEventListener('mousemove', (e) => { activeMouseX = e.clientX; activeMouseY = e.clientY; });
    window.addEventListener('touchmove', (e) => { if (e.touches && e.touches.length > 0) { activeMouseX = e.touches[0].clientX; activeMouseY = e.touches[0].clientY; } }, { passive: true });
</script>

<script>
    (function() {
        const canvas = document.getElementById('golf-canvas'); if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const winModal = document.getElementById('gg-overlay');
        const scoreLabel = document.getElementById('hud-attempts');
        const lvlLabel = document.getElementById('hud-level');
        const probesLabel = document.getElementById('hud-probes');
        
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let _mouseX = 0; let _mouseY = 0;
        // Fix coordinates relative to canvas
        function updateMouseCoords(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.clientX;
            let clientY = e.clientY;
            
            if(e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }
            
            _mouseX = clientX - rect.left;
            _mouseY = clientY - rect.top;
        }

        canvas.addEventListener('mousemove', updateMouseCoords);
        canvas.addEventListener('touchmove', (e) => { updateMouseCoords(e); e.preventDefault(); }, { passive: false });

        let currentLevel = 1;
        let probesLeft = 5;
        let totalScore = 0;
        let calculateActive = true;
        let screenShake = 0;

        let targetNode = { x: 0, y: 0, r: 24 };
        let ballNode = { x: 120, y: 0, vx: 0, vy: 0, r: 6, launching: false };
        let dragControl = { active: false, startX: 0, startY: 0 };
        
        let probeTrail = [];
        let fullPathHistory = [];
        let ghostTrail = [];
        let burstParticles = [];
        let asteroids = [];
        let spaceCrystals = [];
        let repulsors = [];

        function generateLevelLayout() {
            probeTrail = [];
            fullPathHistory = [];
            burstParticles = [];
            ballNode.launching = false;
            dragControl.active = false;
            ballNode.x = Math.min(120, canvas.width * 0.2); 
            ballNode.y = canvas.height / 2;
            ballNode.vx = 0; ballNode.vy = 0;

            targetNode.x = canvas.width * 0.5 + Math.random() * (canvas.width * 0.35);
            targetNode.y = canvas.height * 0.2 + Math.random() * (canvas.height * 0.6);

            asteroids = [];
            const hazardCount = Math.min(3, Math.floor(currentLevel / 2) + 1);
            for (let i = 0; i < hazardCount; i++) {
                asteroids.push({
                    x: canvas.width * 0.35 + (i * 80),
                    y: Math.random() * canvas.height,
                    vx: 0,
                    vy: 1.5 + (currentLevel * 0.4) * (Math.random() > 0.5 ? 1 : -1),
                    r: 14 + Math.random() * 8
                });
            }

            spaceCrystals = [];
            const crystalCount = 3;
            for (let i = 0; i < crystalCount; i++) {
                const angle = (Math.PI * 2 / crystalCount) * i + Math.random();
                const spawnDist = targetNode.r + 40 + Math.random() * 60;
                spaceCrystals.push({
                    x: targetNode.x + Math.cos(angle) * spawnDist,
                    y: targetNode.y + Math.sin(angle) * spawnDist,
                    r: 5,
                    active: true
                });
            }
            
            repulsors = [];
            if (currentLevel >= 3) {
                const repCount = Math.min(3, currentLevel - 2);
                for (let i=0; i<repCount; i++) {
                    repulsors.push({
                        x: canvas.width * 0.3 + Math.random() * (canvas.width * 0.4),
                        y: canvas.height * 0.2 + Math.random() * (canvas.height * 0.6),
                        r: 18 + Math.random() * 12,
                        angle: 0
                    });
                }
            }
            
            updateHudReadout();
        }

        function updateHudReadout() {
            scoreLabel.innerText = totalScore;
            lvlLabel.innerText = currentLevel;
            probesLabel.innerText = probesLeft;
        }

        class ShockwaveParticle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 12;
                this.vy = (Math.random() - 0.5) * 12;
                this.alpha = 1.0; this.color = color || '#ffaa00';
            }
            process() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.03; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill(); ctx.restore();
            }
        }

        function triggerTerminalOverlay(didWin) {
            calculateActive = false;
            
            const titleNode = document.getElementById('gg-screen-title');
            const descNode = document.getElementById('gg-screen-desc');
            const actionBtn = document.getElementById('gg-restart-btn');
            const iconNode = document.getElementById('gg-screen-title');

            if (didWin) {
                if (typeof AudioMatrix !== 'undefined') AudioMatrix.playWin();
                titleNode.innerText = "CAPTURE CONFIRMED";
                iconNode.className = "ph-fill ph-check-circle text-6xl text-green-500 mb-6";
                descNode.innerText = `Data stream stabilized.`;
                actionBtn.innerText = "LAUNCH NEXT PROBE";
            } else {
                if (typeof AudioMatrix !== 'undefined') AudioMatrix.playGameOver();
                titleNode.innerText = "PROBE DEPLETION";
                iconNode.className = "ph-fill ph-warning-circle text-6xl text-red-500 mb-6";
                descNode.innerText = `Final Score: ${totalScore}`;
                actionBtn.innerText = "REBOOT SYSTEMS";
            }
            winModal.style.display = 'flex';
        }
        
        function applyGravity(x, y) {
            let dx = targetNode.x - x; let dy = targetNode.y - y;
            let rDist = Math.sqrt(dx*dx + dy*dy);
            let accelX = 0, accelY = 0;
            
            if (rDist > 1) {
                let simAccel = (targetNode.r * 7.8) / (rDist * rDist);
                accelX += (dx / rDist) * simAccel;
                accelY += (dy / rDist) * simAccel;
            }
            
            repulsors.forEach(rep => {
                let rdx = rep.x - x; let rdy = rep.y - y;
                let rdist = Math.sqrt(rdx*rdx + rdy*rdy);
                if (rdist > 1) {
                    let repAccel = -(rep.r * 8.5) / (rdist * rdist);
                    accelX += (rdx / rdist) * repAccel;
                    accelY += (rdy / rdist) * repAccel;
                }
            });
            
            return { ax: accelX, ay: accelY };
        }

        function computePhysics() {
            if (!calculateActive) return;
            // Clean dark background inherited from Tailwind bg-black, so clear Rect
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            if (screenShake > 0) {
                ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
                screenShake *= 0.85; if (screenShake < 0.5) screenShake = 0;
            }

            // Draw Target (Sun)
            ctx.beginPath(); ctx.fillStyle = '#ffaa00';
            ctx.shadowBlur = 25 + Math.sin(Date.now() * 0.005) * 5; ctx.shadowColor = '#ffaa00';
            ctx.arc(targetNode.x, targetNode.y, targetNode.r, 0, Math.PI*2); ctx.fill();
            ctx.restore();
            
            // Draw Repulsors
            repulsors.forEach(rep => {
                rep.angle += 0.05;
                ctx.save();
                ctx.translate(rep.x, rep.y); ctx.rotate(rep.angle);
                ctx.beginPath(); ctx.strokeStyle = '#ff007f'; ctx.lineWidth = 2;
                ctx.shadowBlur = 15; ctx.shadowColor = '#ff007f';
                ctx.rect(-rep.r/2, -rep.r/2, rep.r, rep.r);
                ctx.stroke();
                ctx.rotate(-rep.angle * 2);
                ctx.rect(-rep.r/2 - 5, -rep.r/2 - 5, rep.r + 10, rep.r + 10);
                ctx.stroke();
                ctx.restore();
            });

            asteroids.forEach(ast => {
                ast.y += ast.vy;
                if (ast.y - ast.r < 0 || ast.y + ast.r > canvas.height) ast.vy *= -1;

                ctx.beginPath(); ctx.fillStyle = '#3a3a3a'; ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1.5; ctx.arc(ast.x, ast.y, ast.r, 0, Math.PI*2); ctx.fill(); ctx.stroke();

                if (ballNode.launching) {
                    let dX = ast.x - ballNode.x; let dY = ast.y - ballNode.y;
                    let dist = Math.sqrt(dX*dX + dY*dY);
                    if (dist < ast.r + ballNode.r) {
                        screenShake = 20;
                        if (typeof AudioMatrix !== 'undefined') AudioMatrix.playError();
                        ghostTrail = [...fullPathHistory];
                        probesLeft--;
                        if (probesLeft <= 0) triggerTerminalOverlay(false);
                        else generateLevelLayout();
                    }
                }
            });

            spaceCrystals.forEach(cry => {
                if (!cry.active) return;
                ctx.save(); ctx.shadowBlur = 10; ctx.shadowColor = '#00e5ff';
                ctx.beginPath(); ctx.fillStyle = '#00e5ff';
                ctx.arc(cry.x, cry.y, cry.r, 0, Math.PI*2); ctx.fill(); ctx.restore();

                if (ballNode.launching) {
                    let dX = cry.x - ballNode.x; let dY = cry.y - ballNode.y;
                    if (Math.sqrt(dX*dX + dY*dY) < cry.r + ballNode.r + 5) {
                        cry.active = false;
                        if (typeof AudioMatrix !== 'undefined') AudioMatrix.playTick();
                        totalScore += 250;
                        updateHudReadout();
                        for(let i=0; i<8; i++) burstParticles.push(new ShockwaveParticle(cry.x, cry.y, '#00e5ff'));
                    }
                }
            });

            if (ballNode.launching) {
                let distanceX = targetNode.x - ballNode.x;
                let distanceY = targetNode.y - ballNode.y;
                let radiusDistance = Math.sqrt(distanceX*distanceX + distanceY*distanceY);

                if (radiusDistance < targetNode.r + 3) {
                    if (typeof AudioMatrix !== 'undefined') AudioMatrix.playWin();
                    totalScore += (probesLeft * 50);
                    currentLevel++;
                    ghostTrail = [];
                    probesLeft = Math.min(7, probesLeft + 1);
                    screenShake = 15;
                    triggerTerminalOverlay(true);
                    return;
                }
                
                repulsors.forEach(rep => {
                    let dX = rep.x - ballNode.x; let dY = rep.y - ballNode.y;
                    if (Math.sqrt(dX*dX + dY*dY) < rep.r + ballNode.r) {
                        screenShake = 25;
                        if (typeof AudioMatrix !== 'undefined') AudioMatrix.playExplosion();
                        ghostTrail = [...fullPathHistory];
                        probesLeft--;
                        if (probesLeft <= 0) triggerTerminalOverlay(false);
                        else generateLevelLayout();
                    }
                });

                if (calculateActive) {
                    let gAccel = applyGravity(ballNode.x, ballNode.y);
                    ballNode.vx += gAccel.ax; ballNode.vy += gAccel.ay;
                    ballNode.x += ballNode.vx; ballNode.y += ballNode.vy;

                    probeTrail.push({ x: ballNode.x, y: ballNode.y });
                    fullPathHistory.push({ x: ballNode.x, y: ballNode.y });
                    if (probeTrail.length > 25) probeTrail.shift();

                    if (ballNode.x < -50 || ballNode.x > canvas.width+50 || ballNode.y < -50 || ballNode.y > canvas.height+50) {
                        if (typeof AudioMatrix !== 'undefined') AudioMatrix.playError();
                        screenShake = 10;
                        ghostTrail = [...fullPathHistory];
                        probesLeft--;
                        if (probesLeft <= 0) triggerTerminalOverlay(false);
                        else generateLevelLayout();
                    }
                }
            }

            // Draw Ghost Trail
            if (ghostTrail.length > 0) {
                ctx.beginPath();
                ctx.setLineDash([2, 6]);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1;
                ctx.moveTo(ghostTrail[0].x, ghostTrail[0].y);
                for (let i = 1; i < ghostTrail.length; i++) {
                    ctx.lineTo(ghostTrail[i].x, ghostTrail[i].y);
                }
                ctx.stroke();
                ctx.setLineDash([]);
            }

            probeTrail.forEach((pt, index) => {
                ctx.beginPath(); ctx.fillStyle = `rgba(0, 229, 255, ${index / probeTrail.length})`;
                ctx.arc(pt.x, pt.y, ballNode.r * (index / probeTrail.length), 0, Math.PI*2); ctx.fill();
            });

            burstParticles.forEach((part, pIdx) => {
                part.process(); part.draw();
                if (part.alpha <= 0) burstParticles.splice(pIdx, 1);
            });


            // Failsafe coordinates
            if (isNaN(ballNode.x) || ballNode.x === 0) ballNode.x = Math.min(120, canvas.width * 0.2) || 120;
            if (isNaN(ballNode.y) || ballNode.y === 0) ballNode.y = canvas.height / 2 || 300;

            // Draw a massive glowing aura to guarantee it's visible
            ctx.beginPath(); 
            ctx.shadowBlur = 20; 
            ctx.shadowColor = ballNode.launching ? '#00e5ff' : '#00ff66';
            ctx.fillStyle = ballNode.launching ? '#00e5ff' : '#00ff66';
            ctx.arc(ballNode.x, ballNode.y, ballNode.r + 2, 0, Math.PI*2); 
            ctx.fill();
            ctx.shadowBlur = 0; // reset
            
            // Draw a bright white core
            ctx.beginPath();
            ctx.fillStyle = '#ffffff';
            ctx.arc(ballNode.x, ballNode.y, 3, 0, Math.PI*2);
            ctx.fill();
            
            // Add a radar pulse stroke
            ctx.beginPath();
            ctx.strokeStyle = ballNode.launching ? 'rgba(0, 229, 255, 0.5)' : 'rgba(0, 255, 102, 0.5)';
            ctx.lineWidth = 2;
            ctx.arc(ballNode.x, ballNode.y, ballNode.r + 8 + Math.sin(Date.now() * 0.005) * 4, 0, Math.PI*2);
            ctx.stroke();


            if (dragControl.active && !ballNode.launching) {
                let simX = ballNode.x; let simY = ballNode.y;
                let simVx = (dragControl.startX - _mouseX) * 0.11;
                let simVy = (dragControl.startY - _mouseY) * 0.11;
                
                for (let i = 0; i < 150; i++) {
                    let dX = targetNode.x - simX; let dY = targetNode.y - simY;
                    let rDist = Math.sqrt(dX*dX + dY*dY);
                    if (rDist < targetNode.r) {
                        ctx.beginPath(); ctx.fillStyle = '#ffaa00'; ctx.arc(simX, simY, 4, 0, Math.PI*2); ctx.fill();
                        break; 
                    }
                    
                    let broke = false;
                    repulsors.forEach(rep => {
                        let rx = rep.x - simX; let ry = rep.y - simY;
                        if (Math.sqrt(rx*rx + ry*ry) < rep.r) broke = true;
                    });
                    if (broke) {
                        ctx.beginPath(); ctx.fillStyle = '#ff007f'; ctx.arc(simX, simY, 6, 0, Math.PI*2); ctx.fill();
                        break;
                    }
                    
                    let gAccel = applyGravity(simX, simY);
                    simVx += gAccel.ax; simVy += gAccel.ay;
                    simX += simVx; simY += simVy;
                    
                    if (i % 3 === 0) {
                        ctx.beginPath(); 
                        ctx.fillStyle = `rgba(0, 229, 255, ${1 - i/150})`;
                        ctx.arc(simX, simY, Math.max(0.5, 3 - (i/40)), 0, Math.PI*2); 
                        ctx.fill();
                    }
                }
            }
            
            ctx.restore();

            requestAnimationFrame(computePhysics);
        }

        const handleStart = (clientX, clientY) => {
            if (!calculateActive) return;
            if (ballNode.launching) {
                // Self-destruct if stuck
                if (typeof AudioMatrix !== 'undefined') AudioMatrix.playError();
                screenShake = 10;
                ghostTrail = [...fullPathHistory];
                probesLeft--;
                if (probesLeft <= 0) triggerTerminalOverlay(false);
                else generateLevelLayout();
                return;
            }
            dragControl.startX = clientX; dragControl.startY = clientY; dragControl.active = true;
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            handleStart(e.clientX - rect.left, e.clientY - rect.top);
        });

        canvas.addEventListener('touchstart', (e) => {
            if (e.touches && e.touches.length > 0) {
                const rect = canvas.getBoundingClientRect();
                handleStart(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
            }
        }, { passive: true });

        const emitAimTicks = () => {
            if (dragControl.active && !ballNode.launching && Math.random() > 0.84) {
                if (typeof AudioMatrix !== 'undefined') AudioMatrix.playTick();
            }
        };
        canvas.addEventListener('mousemove', emitAimTicks);
        canvas.addEventListener('touchmove', emitAimTicks, { passive: true });

        const releaseLaunchEngine = () => {
            if (!dragControl.active) return; dragControl.active = false;
            ballNode.vx = (dragControl.startX - _mouseX) * 0.11;
            ballNode.vy = (dragControl.startY - _mouseY) * 0.11;
            ballNode.launching = true; 
            if (typeof AudioMatrix !== 'undefined') AudioMatrix.playPaperLaunch();
        };

        window.addEventListener('mouseup', releaseLaunchEngine);
        window.addEventListener('touchend', releaseLaunchEngine, { passive: true });

        document.getElementById('gg-restart-btn').onclick = (e) => {
            e.preventDefault(); e.stopImmediatePropagation();

            if (probesLeft <= 0) {
                currentLevel = 1; probesLeft = 5; totalScore = 0;
            }

            winModal.style.display = 'none';

            if (!calculateActive) {
                calculateActive = true;
                generateLevelLayout();
                computePhysics();
            }
        };

        // Initialize
        setTimeout(() => {
            generateLevelLayout();
            computePhysics();
        }, 100);

    })();
</script>
</body>
</html>
