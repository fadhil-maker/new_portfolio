:root {
    --color-accent: #6c63ff;
    --color-surface: #ffffff;

}
html { font-family: var(--font-inter); color: var(--color-text-primary); background: var(--color-surface); }
.dark { color-scheme: dark; }
body { background: var(--color-surface); color: var(--color-text-primary); }
.font-display, .font-outfit { font-family: var(--font-outfit); }
.glass {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
}
.dark .glass {
    background: rgba(255,255,255,0.04);
}
.reveal-up { opacity: 1; transform: none; }

    </style>
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

<body class="relative flex min-h-screen flex-col overflow-x-hidden pt-24 selection:bg-[var(--color-accent)] selection:text-black">

        <div class="pt-32 max-w-7xl mx-auto px-6 mb-32 min-h-[80vh] flex flex-col">
            <!-- Header -->

                <div>
                    <div class="flex items-center gap-4 mb-2">
                        <a href="/" class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-500 hover:text-[var(--color-accent)] transition-colors">

<canvas id="defender-canvas" class="absolute inset-0 w-full h-full z-0"></canvas>

<div class="absolute top-4 left-0 right-0 flex flex-col items-center gap-2 pointer-events-none z-10">

</div>

<div id="td-terminal-screen" class="absolute inset-0 z-50 bg-black/80 backdrop-blur-md flex flex-col items-center justify-center text-center p-6" style="display: flex;">
    <h2 id="td-screen-title" class="text-3xl md:text-5xl font-display font-black text-white mb-4 tracking-wider">INITIATE DEFENSE</h2>
    <p id="td-screen-desc" class="text-gray-300 font-mono text-sm md:text-lg mb-8 max-w-md">The firewall is under heavy DDoS attack. Rely on manual override typing to intercept packets.</p>

</div>
<input type="text" id="arcade-type-input" style="opacity:0; position:absolute; top:0; left:0; z-index:-1;">
            </div>
        </div>

    <footer class="py-8 text-center text-sm text-gray-500 dark:text-gray-400 border-t border-gray-200 dark:border-gray-800">
        <div class="mx-auto max-w-7xl px-6">
            <p>&copy; 2026 | Made with <i class="ph-fill ph-heart text-red-500 mx-1"></i> by Fadhil</p>
        </div>
    </footer>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', () => {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.theme = 'light';
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.theme = 'dark';
                }
            });
        }
    </script>

<script>
    // Shared Audio Engine
    const AudioMatrix = {
        ctx: null,
        init() {
            if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (this.ctx.state === 'suspended') this.ctx.resume();
        },
        playTick() {
            this.init();
            const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(750, this.ctx.currentTime);
            gain.gain.setValueAtTime(0.02, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.015);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.015);
        },
        playDynamicKey(char) {
            this.init();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            const filter = this.ctx.createBiquadFilter();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.05);
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(800, this.ctx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.05);
            gain.gain.setValueAtTime(0, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.15, this.ctx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
            osc.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.06);
        },
        playExplosion() {
            this.init();
            const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, this.ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(60, this.ctx.currentTime + 0.14);
            gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.14);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.14);
        },
        playError() {
            this.init();
            const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, this.ctx.currentTime);
            gain.gain.setValueAtTime(0.09, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, this.ctx.currentTime + 0.15);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.15);
        },
        playGameOver() {
            this.init(); const now = this.ctx.currentTime;
            [160, 130, 95].forEach((freq, i) => {
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(freq, now + i * 0.1);
                gain.gain.setValueAtTime(0.08, now + i * 0.1);
                gain.gain.linearRampToValueAtTime(0.001, now + i * 0.1 + 0.35);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.35);
            });
        },
        playWin() {
            this.init(); const now = this.ctx.currentTime;
            [261.63, 329.63, 392.00, 523.25].forEach((freq, i) => {
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now + i * 0.06);
                gain.gain.setValueAtTime(0.04, now + i * 0.06);
                gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.06 + 0.22);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(now + i * 0.06); osc.stop(now + i * 0.06 + 0.22);
            });
        }
    };
    let activeMouseX = 0, activeMouseY = 0;
    window.addEventListener('mousemove', (e) => { activeMouseX = e.clientX; activeMouseY = e.clientY; });
    window.addEventListener('touchmove', (e) => { if (e.touches && e.touches.length > 0) { activeMouseX = e.touches[0].clientX; activeMouseY = e.touches[0].clientY; } }, { passive: true });
</script>

<script>
    (function() {
        
            const canvas = document.getElementById('defender-canvas'); if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const inputField = document.getElementById('arcade-type-input');
            const scoreLabel = document.getElementById('td-score-readout');
            const overScreen = document.getElementById('td-terminal-screen');
            
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;

            let score = 0; 
            let safetyIntegrity = 3; 
            let fallingWords = []; 
            let blastSparks = [];
            let clockTicks = 0; 
            let sessionActive = true;
            
            let currentCombo = 0;
            let currentLevel = 1;
            let screenShakeIntensity = 0;

            const dictionary = {
                tier1: ['GIT', 'CSS', 'HTML', 'SUDO', 'BASH', 'SSH', 'PORT', 'PING'],
                tier2: ['DJANGO', 'PYTHON', 'SERVER', 'NGINX', 'DOCKER', 'REDIS', 'LINUX'],
                tier3: ['CLOUDFLARE', 'DATABASE', 'JAVASCRIPT', 'POSTGRES', 'METEOROLOGICAL', 'TELEMETRY']
            };

            inputField.value = "";

            class TargetString {
                constructor(isBoss = false) {
                    this.isBoss = isBoss;
                    let pool = dictionary.tier1;
                    if (currentLevel === 2) pool = dictionary.tier1.concat(dictionary.tier2);
                    if (currentLevel >= 3) pool = dictionary.tier2.concat(dictionary.tier3);
                    
                    this.text = this.isBoss ? 'SYSTEM_OVERRIDE_VULNERABILITY_CRITICAL' : pool[Math.floor(Math.random() * pool.length)];
                    this.x = 40 + Math.random() * (canvas.width - 250); 
                    this.y = -15;
                    this.vel = (this.isBoss ? 0.4 : 0.9 + (currentLevel * 0.3) + Math.random() * 0.5);
                    this.pulse = 0;
                }
                update() { 
                    this.y += this.vel; 
                    this.pulse += 0.05;
                    if(this.y > canvas.height - 70) { 
                        if (typeof AudioMatrix !== 'undefined') AudioMatrix.playError();
                        safetyIntegrity--; 
                        currentCombo = 0;
                        screenShakeIntensity = 15;
                        this.y = 99999; 
                    } 
                }
                draw() { 
                    ctx.save();
                    if (this.isBoss) {
                        ctx.fillStyle = `rgb(255, ${Math.floor(Math.sin(this.pulse) * 50 + 50)}, 50)`;
                        ctx.font = 'bold 18px monospace';
                        ctx.shadowBlur = 15; ctx.shadowColor = '#ff0000';
                    } else {
                        ctx.fillStyle = currentLevel === 1 ? '#ff4444' : currentLevel === 2 ? '#ffaa00' : '#ff007f';
                        ctx.font = 'bold 14px monospace';
                    }
                    ctx.fillText(this.text, this.x, this.y);
                    ctx.restore();
                }
            }

            class ExplosionSpark {
                constructor(x, y, color) { 
                    this.x = x; this.y = y; 
                    this.vx = (Math.random() - 0.5) * 12; 
                    this.vy = (Math.random() - 0.5) * 12; 
                    this.alpha = 1.0; 
                    this.color = color || '#00e5ff';
                }
                update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.03; }
                draw() { 
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = this.alpha;
                    ctx.fillRect(this.x, this.y, 3, 3); 
                    ctx.globalAlpha = 1.0;
                }
            }

            function cycle() {
                if (!sessionActive) return;

                ctx.save();
                if (screenShakeIntensity > 0) {
                    const dx = (Math.random() - 0.5) * screenShakeIntensity;
                    const dy = (Math.random() - 0.5) * screenShakeIntensity;
                    ctx.translate(dx, dy);
                    screenShakeIntensity *= 0.9;
                    if (screenShakeIntensity < 0.5) screenShakeIntensity = 0;
                }

                ctx.fillStyle = 'rgba(5, 5, 5, 0.3)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                clockTicks++;
                const spawnInterval = Math.max(35, 90 - (currentLevel * 15));
                if (clockTicks % spawnInterval === 0) {
                    fallingWords.push(new TargetString(Math.random() > 0.92 && currentLevel >= 2));
                }

                ctx.fillStyle = 'rgba(255,255,255,0.02)';
                ctx.font = 'bold 8vw monospace';
                ctx.fillText(`LVL ${currentLevel}`, canvas.width/2 - 120, canvas.height/2 + 50);

                fallingWords.forEach((w, i) => {
                    w.update(); w.draw();
                    if (w.y > canvas.height) fallingWords.splice(i, 1);
                });

                blastSparks.forEach((s, i) => {
                    s.update(); s.draw();
                    if (s.alpha <= 0) blastSparks.splice(i, 1);
                });

                ctx.fillStyle = `rgba(0, 229, 255, ${0.1 + (currentCombo * 0.05)})`;
                ctx.fillRect(0, canvas.height - 65, canvas.width, 2);

                if (currentCombo > 2) {
                    ctx.fillStyle = '#00e5ff';
                    ctx.font = 'italic 12px monospace';
                    ctx.fillText(`STREAK STACK: ${currentCombo}x [STABLE]`, 30, canvas.height - 85);
                }

                for(let i=0; i<3; i++) {
                    ctx.fillStyle = i < safetyIntegrity ? '#00ff66' : 'rgba(255,255,255,0.05)';
                    ctx.fillRect(canvas.width - 40 - (i * 20), 25, 12, 12);
                }

                ctx.restore();

                if (safetyIntegrity <= 0) {
                    sessionActive = false; 
                    if (typeof AudioMatrix !== 'undefined') AudioMatrix.playGameOver();
                    overScreen.style.display = 'flex';
                } else {
                    currentAnimationLoopId = requestAnimationFrame(cycle);
                }
            }

            inputField.oninput = () => {
                if (typeof AudioMatrix !== 'undefined') AudioMatrix.playTick(); 
                const cleaned = inputField.value.trim().toUpperCase();
                
                fallingWords.forEach((target, index) => {
                    if (target.text === cleaned) {
                        if (typeof AudioMatrix !== 'undefined') AudioMatrix.playExplosion(); 
                        
                        currentCombo++;
                        const multiplier = Math.min(5, Math.floor(currentCombo / 3) + 1);
                        const pointsGained = (target.isBoss ? 500 : 100) * multiplier;
                        
                        score += pointsGained; 
                        scoreLabel.innerText = String(score).padStart(4, '0');
                        
                        const targetLevel = Math.floor(score / 600) + 1;
                        if (targetLevel !== currentLevel) {
                            currentLevel = targetLevel;
                            screenShakeIntensity = 8;
                        }

                        const sparksColor = target.isBoss ? '#ff4444' : multiplier > 2 ? '#ffaa00' : '#00e5ff';
                        for(let i=0; i<30; i++) {
                            blastSparks.push(new ExplosionSpark(target.x + 40, target.y, sparksColor));
                        }
                        
                        fallingWords.splice(index, 1); inputField.value = "";
                    }
                });
            };

            const restartButton = document.getElementById('td-restart-btn');
            if (restartButton) {
                restartButton.setAttribute('data-no-route', 'true');
                restartButton.onclick = (e) => {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    if (typeof currentAnimationLoopId !== 'undefined' && currentAnimationLoopId) {
                        cancelAnimationFrame(currentAnimationLoopId);
                    }
                    
                    // Reset game state
                    score = 0;
                    safetyIntegrity = 3;
                    currentCombo = 0;
                    currentLevel = 1;
                    clockTicks = 0;
                    fallingWords = [];
                    blastSparks = [];
                    scoreLabel.innerText = "SCORE: 0 // FIREWALL: 100%";
                    
                    // Hide overlay and focus input
                    overScreen.style.display = 'none';
                    inputField.value = ""; 
                    inputField.focus();
                    
                    // Start loop
                    sessionActive = true;
                    cycle();
                };
            }

            // Game starts paused waiting for the user to click ENGAGE
            sessionActive = false;
    })();
</script>
<input type="text" id="arcade-type-input" style="opacity:0; position:absolute; top:0; left:0; z-index:-1;">
